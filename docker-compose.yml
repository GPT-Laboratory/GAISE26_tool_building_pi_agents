# Workshop platform stack.
# For local dev, override POOL_SIZE in .env or on the command line:
#   POOL_SIZE=1 docker compose up
#
# Setup:
#   cp backend/.env.example .env   # then fill in PI_MODEL, OPENAI_API_KEY, POOL_SIZE, etc.
#   docker build -t pi-workshop -f docker/Dockerfile .
#   docker network create workshop
#   docker compose up -d

networks:
  # The workshop network is created by the backend at startup (ensureNetwork).
  # Mark external so Compose doesn't try to own/relabel it.
  workshop:
    name: workshop
    external: true

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"  # localhost only; nginx proxies externally
    networks:
      - workshop
    volumes:
      # Backend needs Docker socket to manage workshop containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind-mount frontend for live edits without rebuilding
      - ./frontend:/app/frontend:ro
    env_file:
      - .env
    restart: unless-stopped
