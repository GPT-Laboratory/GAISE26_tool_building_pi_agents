# Pi Workshop — nginx reverse proxy
# Install: sudo cp nginx/workshop.conf /etc/nginx/sites-available/workshop
#          sudo ln -s /etc/nginx/sites-available/workshop /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# Rate limit for /join endpoint — supplements the backend's own per-IP limit
limit_req_zone $binary_remote_addr zone=join_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;   # replace with your hostname or IP if you have one

    # Tighten default timeouts
    client_max_body_size 25M;   # slightly above the 20 MB upload limit
    client_body_timeout  30s;
    send_timeout         30s;

    # Hide nginx version
    server_tokens off;

    # ----------------------------------------------------------------
    # Admin endpoints — restrict to localhost and operator machine only.
    # Add your laptop's IP to the allow list.
    # ----------------------------------------------------------------
    location /admin {
        allow 127.0.0.1;
        # allow YOUR_OPERATOR_IP;
        deny all;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------------------------------
    # Join endpoint — rate limited at the nginx level
    # ----------------------------------------------------------------
    location /join {
        limit_req zone=join_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------------------------------
    # WebSocket upgrade — agent and work panes
    # ----------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;   # keep WebSocket connections alive
        proxy_send_timeout  3600s;
    }

    # ----------------------------------------------------------------
    # Everything else (frontend, upload)
    # ----------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
